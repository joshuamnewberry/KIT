name: Android and iOS Unit Testing

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  android-unit-tests:
    name: Android Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle Executable
        run: chmod +x gradlew

      - name: Run Android Unit Testing
        run: ./gradlew androidApp:testDebugUnitTest --rerun-tasks --no-daemon

      - name: Upload Android Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Android-Unit-Test-Reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: warn

  ios-build-verification:
    name: iOS Build Verification
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Make Gradle Executable
        run: chmod +x gradlew

      - name: Compile iOS Main Source
        run: ./gradlew shared:compileKotlinIosSimulatorArm64 --rerun-tasks --no-daemon

      - name: Upload iOS Build Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: iOS-Build-Reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: warn