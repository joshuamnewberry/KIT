name: KIT Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  android-tests:
    name: Android Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Make Gradle executable
        run: chmod +x ./gradlew

      - name: Run Android unit tests
        run: ./gradlew androidApp:testDebugUnitTest --rerun-tasks --no-daemon